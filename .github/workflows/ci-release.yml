name: verify and release

on:
  push:
    branches: [master, "migration/**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run typecheck
      - run: bun run build

  artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: ubuntu-latest, target: bun-linux-x64, name: sessions-linux-x64, executable: true }
          - { os: ubuntu-latest, target: bun-linux-arm64, name: sessions-linux-arm64, executable: false }
          - { os: macos-15-intel, target: bun-darwin-x64, name: sessions-darwin-x64, executable: true }
          - { os: macos-15-intel, target: bun-darwin-arm64, name: sessions-darwin-arm64, executable: false }
          - { os: windows-latest, target: bun-windows-x64, name: sessions-windows-x64.exe, executable: true }
          - { os: windows-latest, target: bun-windows-arm64, name: sessions-windows-arm64.exe, executable: false }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run typecheck
      - run: bun scripts/compile.ts --target ${{ matrix.target }} --outfile artifacts/${{ matrix.name }}
      - if: matrix.executable
        run: bun scripts/artifact-smoke.ts artifacts/${{ matrix.name }}
      - run: bun scripts/checksum.ts artifacts/${{ matrix.name }}
      - run: bun scripts/record-verification.ts artifacts/${{ matrix.name }} ${{ matrix.target }} ${{ matrix.executable }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: gh release create "$GITHUB_REF_NAME" artifacts/* --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
